name: Infra Terraform

on:
  workflow_dispatch:
    inputs:
      action:
        description: Terraform action
        required: true
        default: plan
        type: choice
        options:
          - plan
          - apply

env:
  AWS_REGION: us-east-1
  TF_DIR: infra/terraform-ec2

jobs:
  terraform:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Prepare tfvars from secret
        working-directory: ${{ env.TF_DIR }}
        run: |
          set -euo pipefail
          if [ -z "${{ secrets.TERRAFORM_TFVARS_BASE64 }}" ]; then
            echo "Secret TERRAFORM_TFVARS_BASE64 is required."
            echo "Generate with: base64 -w 0 infra/terraform-ec2/terraform.tfvars"
            exit 1
          fi
          echo "${{ secrets.TERRAFORM_TFVARS_BASE64 }}" | base64 -d > terraform.auto.tfvars

      - name: Terraform Init
        working-directory: ${{ env.TF_DIR }}
        run: terraform init -input=false

      - name: Terraform Validate
        working-directory: ${{ env.TF_DIR }}
        run: terraform validate

      - name: Terraform Plan
        if: ${{ github.event.inputs.action == 'plan' }}
        working-directory: ${{ env.TF_DIR }}
        run: terraform plan -no-color

      - name: Terraform Apply
        if: ${{ github.event.inputs.action == 'apply' }}
        working-directory: ${{ env.TF_DIR }}
        run: terraform apply -auto-approve -no-color
