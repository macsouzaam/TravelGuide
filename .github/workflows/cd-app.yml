name: CD App

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  AWS_REGION: us-east-1
  ECR_REPO: travelguide
  INSTANCE_NAME_TAG: travelguide-prod

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Resolve AWS account
        id: aws-account
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          echo "account_id=$ACCOUNT_ID" >> "$GITHUB_OUTPUT"

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push image
        env:
          ACCOUNT_ID: ${{ steps.aws-account.outputs.account_id }}
        run: |
          set -euo pipefail
          IMAGE_URI="$ACCOUNT_ID.dkr.ecr.${AWS_REGION}.amazonaws.com/${ECR_REPO}"
          SHORT_SHA="${GITHUB_SHA::7}"

          docker build --platform linux/amd64 -t "$IMAGE_URI:$SHORT_SHA" -t "$IMAGE_URI:latest" .
          docker push "$IMAGE_URI:$SHORT_SHA"
          docker push "$IMAGE_URI:latest"

      - name: Resolve target instance id
        id: target-instance
        run: |
          set -euo pipefail
          INSTANCE_JSON=$(aws ec2 describe-instances \
            --region "$AWS_REGION" \
            --filters "Name=tag:Name,Values=${INSTANCE_NAME_TAG}" "Name=instance-state-name,Values=running,pending" \
            --query "Reservations[].Instances[].[InstanceId,PublicIpAddress,PublicDnsName]" \
            --output text | head -1)

          INSTANCE_ID=$(echo "$INSTANCE_JSON" | awk '{print $1}')
          PUBLIC_IP=$(echo "$INSTANCE_JSON" | awk '{print $2}')
          PUBLIC_DNS=$(echo "$INSTANCE_JSON" | awk '{print $3}')

          if [ -z "$INSTANCE_ID" ] || [ "$INSTANCE_ID" = "None" ]; then
            echo "No running instance found with tag Name=${INSTANCE_NAME_TAG}"
            exit 1
          fi

          echo "instance_id=$INSTANCE_ID" >> "$GITHUB_OUTPUT"
          echo "app_url=http://${PUBLIC_IP}" >> "$GITHUB_OUTPUT"
          echo "Instance: $INSTANCE_ID | IP: $PUBLIC_IP | DNS: $PUBLIC_DNS"

      - name: Deploy via SSM
        env:
          ACCOUNT_ID: ${{ steps.aws-account.outputs.account_id }}
          INSTANCE_ID: ${{ steps.target-instance.outputs.instance_id }}
        run: |
          set -euo pipefail
          IMAGE_URI="$ACCOUNT_ID.dkr.ecr.${AWS_REGION}.amazonaws.com/${ECR_REPO}:latest"

          COMMAND_ID=$(aws ssm send-command \
            --region "$AWS_REGION" \
            --instance-ids "$INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --parameters "commands=[\
              \"aws ecr get-login-password --region ${AWS_REGION} | docker login --username AWS --password-stdin ${ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com\",\
              \"docker pull ${IMAGE_URI}\",\
              \"docker stop travelguide || true\",\
              \"docker rm travelguide || true\",\
              \"docker run -d --name travelguide --restart unless-stopped --env-file /etc/travelguide.env -p 80:3000 ${IMAGE_URI}\"\
            ]" \
            --query "Command.CommandId" \
            --output text)

          echo "SSM Command ID: $COMMAND_ID"

          aws ssm wait command-executed \
            --region "$AWS_REGION" \
            --command-id "$COMMAND_ID" \
            --instance-id "$INSTANCE_ID"

          STATUS=$(aws ssm get-command-invocation \
            --region "$AWS_REGION" \
            --command-id "$COMMAND_ID" \
            --instance-id "$INSTANCE_ID" \
            --query Status --output text)

          echo "SSM status: $STATUS"

          if [ "$STATUS" != "Success" ]; then
            aws ssm get-command-invocation \
              --region "$AWS_REGION" \
              --command-id "$COMMAND_ID" \
              --instance-id "$INSTANCE_ID" \
              --query StandardErrorContent \
              --output text
            exit 1
          fi

      - name: Health check
        env:
          APP_URL: ${{ steps.target-instance.outputs.app_url }}
        run: |
          set -euo pipefail
          echo "Aguardando app iniciar em $APP_URL ..."
          for i in $(seq 1 12); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 5 "$APP_URL" || echo "000")
            echo "  tentativa $i/12 → HTTP $STATUS"
            if [ "$STATUS" = "200" ]; then
              echo "Health check OK — app respondendo em $APP_URL"
              exit 0
            fi
            sleep 10
          done
          echo "Health check FAILED — app não respondeu com 200 após 2 minutos"
          exit 1
